# Nginx — CDN estático para Universal/App Links (CF-15)
# Montar backend/cdn como root ou proxy para API com cache longo.

server {
    listen 443 ssl http2;
    server_name app.coreflow.app;

    # ssl_certificate     /etc/ssl/certs/app.coreflow.app.pem;
    # ssl_certificate_key /etc/ssl/private/app.coreflow.app.key;

    root /var/www/coreflow-cdn;
    index index.html;

    location /.well-known/apple-app-site-association {
        default_type application/json;
        add_header Cache-Control "public, max-age=86400, s-maxage=86400";
        add_header CDN-Cache-Control "max-age=86400";
        try_files /.well-known/apple-app-site-association =404;
    }

    location /.well-known/assetlinks.json {
        default_type application/json;
        add_header Cache-Control "public, max-age=86400, s-maxage=86400";
        add_header CDN-Cache-Control "max-age=86400";
        try_files /.well-known/assetlinks.json =404;
    }

    # Universal links tenant paths → app ou fallback web
    location / {
        try_files $uri $uri/ @api;
    }

    location @api {
        proxy_pass http://api:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
