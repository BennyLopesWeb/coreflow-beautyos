services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - coreflow_data:/app/data
    environment:
      - DATABASE_URL=sqlite:///./data/coreflow.db
      - DEBUG=true
    working_dir: /app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

# MySQL: docker compose -f docker-compose.yml -f docker-compose.mysql.yml up

volumes:
  coreflow_data:
