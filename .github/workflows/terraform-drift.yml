name: CoreFlow Terraform Drift

on:
  pull_request:
    paths:
      - "infra/terraform/**"
      - "backend/app/modules/mobile/application/terraform_*.py"
      - "backend/plugins/**/manifest.yaml"
      - "scripts/terraform-drift.sh"
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment (all | dev | staging | prod)"
        required: true
        default: all
        type: choice
        options:
          - all
          - dev
          - staging
          - prod

jobs:
  config-drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        working-directory: backend
        run: pip install -r requirements.txt pydantic-settings pyyaml -q

      - name: Check config drift
        working-directory: backend
        run: |
          ENV="${{ github.event.inputs.environment || 'all' }}"
          cd ..
          chmod +x scripts/terraform-drift.sh
          ./scripts/terraform-drift.sh "$ENV" config || {
            echo "::error::Terraform config drift detected — run make terraform-pipeline-export"
            exit 1
          }

  plan-drift:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    needs: config-drift
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        working-directory: backend
        run: pip install -r requirements.txt pydantic-settings pyyaml -q

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"

      - name: Plan drift check (live)
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          TERRAFORM_DRIFT_LIVE: "true"
        run: |
          ENV="${{ github.event.inputs.environment }}"
          if [[ "$ENV" == "all" ]]; then ENV="dev"; fi
          cd backend
          python -c "
          import os
          os.environ['TERRAFORM_DRIFT_LIVE'] = 'true'
          from app.core.plugin.registry import plugin_registry
          from app.modules.mobile.application.terraform_drift_service import TerraformDriftService
          plugin_registry.load_all()
          result = TerraformDriftService().plan_drift('$ENV')
          print(result)
          import sys
          sys.exit(2 if result.get('has_drift') else 0)
          "
