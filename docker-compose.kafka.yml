# Kafka overlay — use: docker compose -f docker-compose.yml -f docker-compose.kafka.yml up

services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 30s

  api:
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      OUTBOX_DISPATCH_MODE: kafka
      KAFKA_ENABLED: "true"
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      KAFKA_DLQ_ENABLED: "true"
      KAFKA_DLQ_TOPIC: coreflow.events.dlq
      KAFKA_DLQ_REPLAY_ENABLED: "true"

  dlq-replay-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    depends_on:
      kafka:
        condition: service_healthy
      api:
        condition: service_started
    volumes:
      - ./backend:/app
    working_dir: /app
    environment:
      DATABASE_URL: sqlite:///./data/coreflow.db
      KAFKA_ENABLED: "true"
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      KAFKA_DLQ_ENABLED: "true"
      KAFKA_DLQ_REPLAY_ENABLED: "true"
    command: python -m app.workers.dlq_replay_worker --mode loop --interval 60

  outbox-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    depends_on:
      kafka:
        condition: service_healthy
      api:
        condition: service_started
    volumes:
      - ./backend:/app
    working_dir: /app
    environment:
      DATABASE_URL: sqlite:///./data/coreflow.db
      KAFKA_ENABLED: "true"
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      KAFKA_DLQ_ENABLED: "true"
      KAFKA_DLQ_TOPIC: coreflow.events.dlq
    command: python -m app.workers.outbox_worker --mode kafka --interval 2
